<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LinkGrab - 多平台影片下載器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui, -apple-system, 'Segoe UI', Roboto;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;padding:20px}
        .container{max-width:800px;margin:0 auto}
        .header{text-align:center;margin-bottom:30px}
        .header h1{font-size:48px;color:white;margin-bottom:10px}
        .header h1 span{background:linear-gradient(135deg,#e94560,#ff6b6b);-webkit-background-clip:text;background-clip:text;color:transparent}
        .header p{color:rgba(255,255,255,0.8)}
        .platform-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:30px}
        .badge{background:rgba(255,255,255,0.15);padding:8px 18px;border-radius:40px;color:white;font-size:14px}
        .card{background:white;border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .step{display:flex;gap:20px;margin-bottom:30px}
        .step-number{width:40px;height:40px;background:linear-gradient(135deg,#e94560,#1a1a2e);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px}
        .step-title{font-size:20px;font-weight:600;margin-bottom:8px}
        .step-desc{color:#666;font-size:14px;margin-bottom:15px}
        .url-input-wrapper{display:flex;gap:12px}
        #urlInput{flex:1;padding:14px 18px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;outline:none}
        #urlInput:focus{border-color:#e94560}
        .btn-primary{padding:14px 28px;background:linear-gradient(135deg,#e94560,#1a1a2e);color:white;border:none;border-radius:12px;cursor:pointer}
        .format-options{display:flex;gap:15px;margin:15px 0}
        .format-card{flex:1;background:#f8f9fa;border:2px solid #e0e0e0;border-radius:16px;padding:20px;text-align:center;cursor:pointer}
        .format-card.selected{border-color:#e94560;background:#fff0f2}
        .format-icon{font-size:32px;margin-bottom:8px}
        .quality-section{margin-top:20px}
        .quality-label{font-weight:600;margin-bottom:12px}
        .quality-options{display:flex;gap:12px}
        .quality-card{flex:1;background:#f8f9fa;border:2px solid #e0e0e0;border-radius:12px;padding:12px;text-align:center;cursor:pointer}
        .quality-card.active{border-color:#e94560;background:#fff0f2}
        .btn-download{width:100%;padding:16px;background:linear-gradient(135deg,#00b09b,#96c93d);color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;margin-top:10px}
        .loading{text-align:center;padding:30px;display:none}
        .spinner{width:50px;height:50px;border:4px solid #f0f0f0;border-top-color:#e94560;border-radius:50%;margin:0 auto 15px;animation:spin 0.6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error-message{background:#ffe0e0;color:#d32f2f;padding:14px;border-radius:12px;margin-top:20px;display:none;text-align:center}
        .playlist-section{margin-top:20px;padding-top:20px;border-top:1px solid #eee;display:none}
        .playlist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .playlist-title{font-weight:600;font-size:16px}
        .select-all{font-size:13px;cursor:pointer}
        .video-list{max-height:300px;overflow-y:auto;border:1px solid #eee;border-radius:12px}
        .video-item{display:flex;align-items:center;padding:10px 15px;border-bottom:1px solid #eee;gap:12px}
        .video-item:last-child{border-bottom:none}
        .video-checkbox{width:18px;height:18px;cursor:pointer}
        .video-title{flex:1;font-size:14px;color:#333;word-break:break-word}
        .btn-download-playlist{width:100%;padding:14px;background:linear-gradient(135deg,#e94560,#1a1a2e);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:15px}
        .footer{text-align:center;margin-top:30px;color:rgba(255,255,255,0.6);font-size:12px}
        .step{display:none}
        .step.visible{display:flex}
        @media (max-width:768px){.step.visible{flex-direction:column}.url-input-wrapper{flex-direction:column}.format-options,.quality-options{flex-direction:column}}
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🔗 <span>LinkGrab</span></h1><p>貼上連結，快速下載影片與音樂</p></div>
    <div class="platform-badges">
        <span class="badge">▶️ YouTube</span><span class="badge">📘 Facebook</span><span class="badge">📱 TikTok</span>
        <span class="badge">📷 Instagram</span><span class="badge">🎧 SoundCloud</span><span class="badge">🐦 Twitter</span><span class="badge">🎬 Vimeo</span>
    </div>
    <div class="card">
        <div class="step visible" id="step1">
            <div class="step-number">1</div>
            <div class="step-content">
                <div class="step-title">貼上連結</div>
                <div class="step-desc">支援 YouTube、Facebook、TikTok、Instagram、SoundCloud、Twitter、Vimeo（YouTube 播放清單也支援）</div>
                <div class="url-input-wrapper">
                    <input type="text" id="urlInput" placeholder="貼上影片或播放清單連結...">
                    <button id="analyzeBtn" class="btn-primary">分析</button>
                </div>
            </div>
        </div>
        
        <div class="step" id="step2">
            <div class="step-number">2</div>
            <div class="step-content">
                <div class="step-title">選擇格式</div>
                <div class="format-options">
                    <div class="format-card" data-format="mp4"><div class="format-icon">🎬</div><div>影片 MP4</div></div>
                    <div class="format-card" data-format="mp3"><div class="format-icon">🎵</div><div>音樂 MP3</div></div>
                </div>
                <div class="quality-section" id="qualitySection">
                    <div class="quality-label">畫質</div>
                    <div class="quality-options">
                        <div class="quality-card" data-quality="high">1080p</div>
                        <div class="quality-card" data-quality="medium">720p</div>
                        <div class="quality-card" data-quality="low">480p</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 播放清單區域 -->
        <div id="playlistArea" class="playlist-section">
            <div class="playlist-header">
                <div class="playlist-title">📋 <span id="playlistTitle">播放清單</span></div>
                <label class="select-all"><input type="checkbox" id="selectAllCheckbox" checked> 全選</label>
            </div>
            <div id="videoList" class="video-list"></div>
            <button id="downloadPlaylistBtn" class="btn-download-playlist">📦 下載所選項目</button>
        </div>
        
        <div class="step" id="step3">
            <div class="step-number">3</div>
            <div class="step-content">
                <button id="downloadBtn" class="btn-download">⬇️ 下載</button>
            </div>
        </div>
        
        <div id="loading" class="loading"><div class="spinner"></div><p id="loadingText">處理中...</p></div>
        <div id="errorMsg" class="error-message"></div>
    </div>
    <div class="footer"><p>⚠️ 請遵守版權法規，僅供個人合理使用</p></div>
</div>
<script>
const API_URL = window.location.origin;
const analyzeBtn = document.getElementById('analyzeBtn');
const urlInput = document.getElementById('urlInput');
const step2 = document.getElementById('step2');
const step3 = document.getElementById('step3');
const qualitySection = document.getElementById('qualitySection');
const downloadBtn = document.getElementById('downloadBtn');
const loadingDiv = document.getElementById('loading');
const loadingText = document.getElementById('loadingText');
const errorMsg = document.getElementById('errorMsg');
const playlistArea = document.getElementById('playlistArea');
const videoListDiv = document.getElementById('videoList');
const playlistTitleSpan = document.getElementById('playlistTitle');
const selectAllCheckbox = document.getElementById('selectAllCheckbox');
const downloadPlaylistBtn = document.getElementById('downloadPlaylistBtn');

let selectedFormat = 'mp4';
let selectedQuality = 'high';
let currentUrl = '';
let currentPlaylist = null;

document.querySelectorAll('.format-card').forEach(card => {
    card.addEventListener('click', () => {
        document.querySelectorAll('.format-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedFormat = card.dataset.format;
        qualitySection.style.display = selectedFormat === 'mp3' ? 'none' : 'block';
    });
});

document.querySelectorAll('.quality-card').forEach(card => {
    card.addEventListener('click', () => {
        document.querySelectorAll('.quality-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        selectedQuality = card.dataset.quality;
    });
});

function showError(msg) {
    errorMsg.textContent = `❌ ${msg}`;
    errorMsg.style.display = 'block';
    setTimeout(() => errorMsg.style.display = 'none', 5000);
}

function showLoading(show, text = '處理中...') {
    loadingDiv.style.display = show ? 'block' : 'none';
    if (loadingText) loadingText.textContent = text;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function analyzeUrl() {
    const url = urlInput.value.trim();
    if (!url) {
        showError('請輸入網址');
        return;
    }
    
    currentUrl = url;
    showLoading(true, '分析中...');
    step2.classList.remove('visible');
    step3.classList.remove('visible');
    playlistArea.style.display = 'none';
    downloadBtn.style.display = 'none';
    
    try {
        const response = await fetch(`${API_URL}/api/info`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
        });
        
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        
        step2.classList.add('visible');
        
        if (data.type === 'playlist') {
            // 顯示播放清單
            currentPlaylist = data;
            playlistTitleSpan.textContent = data.title || '播放清單';
            videoListDiv.innerHTML = '';
            
            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'video-item';
                div.innerHTML = `
                    <input type="checkbox" class="video-checkbox" data-url="${escapeHtml(item.url)}" checked>
                    <span class="video-title">${escapeHtml(item.title)}</span>
                `;
                videoListDiv.appendChild(div);
            });
            
            playlistArea.style.display = 'block';
            downloadBtn.style.display = 'none';
            step3.classList.remove('visible');
            
            // 全選功能
            selectAllCheckbox.onchange = (e) => {
                document.querySelectorAll('.video-checkbox').forEach(cb => {
                    cb.checked = e.target.checked;
                });
            };
            
        } else {
            // 單一影片
            playlistArea.style.display = 'none';
            step3.classList.add('visible');
            downloadBtn.style.display = 'block';
        }
        
    } catch (err) {
        showError(err.message);
    } finally {
        showLoading(false);
    }
}

async function download() {
    if (!currentUrl) {
        showError('請先分析網址');
        return;
    }
    
    showLoading(true, '下載中...');
    
    try {
        const response = await fetch(`${API_URL}/api/download`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                url: currentUrl,
                quality: selectedQuality,
                format: selectedFormat
            })
        });
        
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || '下載失敗');
        }
        
        const blob = await response.blob();
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        
        let filename = selectedFormat === 'mp3' ? 'audio.mp3' : 'video.mp4';
        const contentDisposition = response.headers.get('Content-Disposition');
        if (contentDisposition) {
            const match = contentDisposition.match(/filename\*=UTF-8''(.+)/);
            if (match) filename = decodeURIComponent(match[1]);
        }
        
        a.download = filename;
        a.click();
        URL.revokeObjectURL(downloadUrl);
    } catch (err) {
        showError(err.message);
    } finally {
        showLoading(false);
    }
}

async function downloadPlaylist() {
    if (!currentPlaylist || !currentPlaylist.items) {
        showError('無效的播放清單');
        return;
    }
    
    const selectedItems = Array.from(document.querySelectorAll('.video-checkbox:checked'))
        .map(cb => {
            const url = cb.dataset.url;
            const item = currentPlaylist.items.find(i => i.url === url);
            return item;
        })
        .filter(item => item);
    
    if (selectedItems.length === 0) {
        showError('請至少選擇一個影片');
        return;
    }
    
    showLoading(true, `準備下載 ${selectedItems.length} 個影片...`);
    
    try {
        const response = await fetch(`${API_URL}/api/download-playlist`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                items: selectedItems,
                quality: selectedQuality,
                format: selectedFormat,
                playlistTitle: currentPlaylist.title
            })
        });
        
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error || '下載失敗');
        }
        
        const blob = await response.blob();
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        
        let filename = `${currentPlaylist.title || 'playlist'}.zip`;
        const contentDisposition = response.headers.get('Content-Disposition');
        if (contentDisposition) {
            const match = contentDisposition.match(/filename\*=UTF-8''(.+)/);
            if (match) filename = decodeURIComponent(match[1]);
        }
        
        a.download = filename;
        a.click();
        URL.revokeObjectURL(downloadUrl);
        
    } catch (err) {
        showError(err.message);
    } finally {
        showLoading(false);
    }
}

analyzeBtn.addEventListener('click', analyzeUrl);
downloadBtn.addEventListener('click', download);
downloadPlaylistBtn.addEventListener('click', downloadPlaylist);
urlInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') analyzeUrl();
});

document.querySelector('.format-card').classList.add('selected');
document.querySelector('.quality-card').classList.add('active');
qualitySection.style.display = 'block';
</script>
</body>
</html>
