<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkGrab - 網頁版</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,'Segoe UI',Roboto;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;padding:20px;position:relative}
        .menu-dropdown{position:absolute;top:20px;right:20px;z-index:100}
        .menu-btn{background:rgba(255,255,255,0.2);color:white;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;backdrop-filter:blur(10px)}
        .menu-btn:hover{background:#e94560}
        .menu-content{display:none;position:absolute;right:0;top:45px;background:white;min-width:170px;border-radius:8px;overflow:hidden;box-shadow:0 8px 16px rgba(0,0,0,0.2)}
        .menu-content a{color:#333;padding:12px 16px;text-decoration:none;display:block;font-size:14px}
        .menu-content a:hover{background:#f0f0f0}
        .menu-dropdown:hover .menu-content{display:block}
        .container{max-width:800px;margin:0 auto}
        .header{text-align:center;margin-bottom:30px}
        .header h1{font-size:48px;color:white;margin-bottom:10px}
        .header h1 span{background:linear-gradient(135deg,#e94560,#ff6b6b);-webkit-background-clip:text;background-clip:text;color:transparent}
        .header p{color:rgba(255,255,255,0.8)}
        .platform-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:30px}
        .badge{background:rgba(255,255,255,0.15);padding:8px 18px;border-radius:40px;color:white;font-size:14px}
        .card{background:white;border-radius:24px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .step{display:flex;gap:20px;margin-bottom:30px}
        .step-number{width:40px;height:40px;background:linear-gradient(135deg,#e94560,#1a1a2e);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px}
        .step-title{font-size:20px;font-weight:600;margin-bottom:8px}
        .step-desc{color:#666;font-size:14px;margin-bottom:15px}
        .url-input-wrapper{display:flex;gap:12px}
        #urlInput{flex:1;padding:14px 18px;border:2px solid #e0e0e0;border-radius:12px;font-size:15px;outline:none}
        #urlInput:focus{border-color:#e94560}
        .btn-primary{padding:14px 28px;background:linear-gradient(135deg,#e94560,#1a1a2e);color:white;border:none;border-radius:12px;cursor:pointer}
        .format-options{display:flex;gap:15px;margin:15px 0}
        .format-card{flex:1;background:#f8f9fa;border:2px solid #e0e0e0;border-radius:16px;padding:20px;text-align:center;cursor:pointer}
        .format-card.selected{border-color:#e94560;background:#fff0f2}
        .format-icon{font-size:32px;margin-bottom:8px}
        .quality-section{margin-top:20px}
        .quality-label{font-weight:600;margin-bottom:12px}
        .quality-options{display:flex;gap:12px}
        .quality-card{flex:1;background:#f8f9fa;border:2px solid #e0e0e0;border-radius:12px;padding:12px;text-align:center;cursor:pointer}
        .quality-card.active{border-color:#e94560;background:#fff0f2}
        .btn-download{width:100%;padding:16px;background:linear-gradient(135deg,#00b09b,#96c93d);color:white;border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;margin-top:10px}
        .loading{text-align:center;padding:30px;display:none}
        .spinner{width:50px;height:50px;border:4px solid #f0f0f0;border-top-color:#e94560;border-radius:50%;margin:0 auto 15px;animation:spin 0.6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error-message{background:#ffe0e0;color:#d32f2f;padding:14px;border-radius:12px;margin-top:20px;display:none}
        .footer{text-align:center;margin-top:30px;color:rgba(255,255,255,0.6);font-size:12px}
        .step{display:none}
        .step.visible{display:flex}
        @media (max-width:768px){.step.visible{flex-direction:column}.url-input-wrapper{flex-direction:column}.format-options,.quality-options{flex-direction:column}.menu-btn{padding:6px 12px;font-size:14px}.badge{padding:6px 12px;font-size:11px}}
    </style>
</head>
<body>
<div class="menu-dropdown">
    <button class="menu-btn">☰ 選單</button>
    <div class="menu-content">
        <a href="mailto:contact.website676@gmail.com">📧 聯絡我們</a>
        <a href="#" id="faqBtn">❓ 常見問題</a>
        <a href="#" id="tutorialBtn">📖 使用教學</a>
        <a href="https://drive.google.com/uc?export=download&id=1XqgBpflk0VRXWwWYqQpWrkyLbIxt_uus">💻 電腦版下載</a>
    </div>
</div>
</div>
<div class="container">
    <div class="header"><h1>🔗 <span>LinkGrab</span></h1><p>貼上連結，快速下載影片與音樂</p></div>
    <div class="platform-badges">
        <span class="badge">▶️ YouTube</span><span class="badge">📘 Facebook</span><span class="badge">📱 TikTok</span>
        <span class="badge">📷 Instagram</span><span class="badge">🎧 SoundCloud</span><span class="badge">🐦 Twitter</span><span class="badge">🎬 Vimeo</span>
    </div>
    <div class="card">
        <div class="step visible" id="step1">
            <div class="step-number">1</div>
            <div class="step-content">
                <div class="step-title">貼上連結</div>
                <div class="step-desc">支援 YouTube、Facebook、TikTok、Instagram、SoundCloud、Twitter、Vimeo</div>
                <div class="url-input-wrapper"><input type="text" id="urlInput" placeholder="貼上影片或音樂連結..."><button id="analyzeBtn" class="btn-primary">分析</button></div>
            </div>
        </div>
        <div class="step" id="step2">
            <div class="step-number">2</div>
            <div class="step-content">
                <div class="step-title">選擇格式</div>
                <div class="format-options">
                    <div class="format-card" data-format="mp4"><div class="format-icon">🎬</div><div>影片 MP4</div></div>
                    <div class="format-card" data-format="mp3"><div class="format-icon">🎵</div><div>音樂 MP3</div></div>
                </div>
                <div class="quality-section" id="qualitySection">
                    <div class="quality-label">畫質</div>
                    <div class="quality-options">
                        <div class="quality-card" data-quality="high">1080p</div>
                        <div class="quality-card" data-quality="medium">720p</div>
                        <div class="quality-card" data-quality="low">480p</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="step" id="step3"><div class="step-number">3</div><div class="step-content"><button id="downloadBtn" class="btn-download">⬇️ 下載</button></div></div>
        <div id="loading" class="loading"><div class="spinner"></div><p>處理中...</p></div>
        <div id="errorMsg" class="error-message"></div>
    </div>
    <div class="footer"><p>⚠️ 請遵守版權法規，僅供個人合理使用</p></div>
</div>
<script>
document.getElementById('faqBtn')?.addEventListener('click',(e)=>{e.preventDefault();alert('❓ 常見問題\n\n1. 無法下載？\n   請確認連結正確，或改用電腦版。\n\n2. 下載速度慢？\n   影片大小影響速度。\n\n3. 支援哪些平台？\n   YouTube、Facebook、TikTok、Instagram、SoundCloud、Twitter、Vimeo');});
document.getElementById('tutorialBtn')?.addEventListener('click',(e)=>{e.preventDefault();alert('📖 使用教學\n\n1. 貼上影片或音樂連結\n2. 點擊「分析」\n3. 選擇格式\n4. 選擇畫質\n5. 點擊「下載」');});
const API_URL=window.location.origin,analyzeBtn=document.getElementById('analyzeBtn'),urlInput=document.getElementById('urlInput'),step2=document.getElementById('step2'),step3=document.getElementById('step3'),qualitySection=document.getElementById('qualitySection'),downloadBtn=document.getElementById('downloadBtn'),loadingDiv=document.getElementById('loading'),errorMsg=document.getElementById('errorMsg');
let selectedFormat='mp4',selectedQuality='high',currentUrl='';
document.querySelectorAll('.format-card').forEach(c=>{c.addEventListener('click',()=>{document.querySelectorAll('.format-card').forEach(c=>c.classList.remove('selected'));c.classList.add('selected');selectedFormat=c.dataset.format;qualitySection.style.display=selectedFormat==='mp3'?'none':'block';})});
document.querySelectorAll('.quality-card').forEach(c=>{c.addEventListener('click',()=>{document.querySelectorAll('.quality-card').forEach(c=>c.classList.remove('active'));c.classList.add('active');selectedQuality=c.dataset.quality;})});
function showError(msg){errorMsg.textContent=`❌ ${msg}`;errorMsg.style.display='block';setTimeout(()=>errorMsg.style.display='none',5000);}
function showLoading(s){loadingDiv.style.display=s?'block':'none';}
async function analyzeUrl(){const u=urlInput.value.trim();if(!u){showError('請輸入網址');return;}currentUrl=u;showLoading(true);step2.classList.remove('visible');step3.classList.remove('visible');try{const r=await fetch(`${API_URL}/api/info`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:u})});const d=await r.json();if(d.error)throw new Error(d.error);step2.classList.add('visible');step3.classList.add('visible');}catch(e){showError(e.message);}finally{showLoading(false);}}
async function download(){if(!currentUrl){showError('請先分析網址');return;}showLoading(true);try{const r=await fetch(`${API_URL}/api/download`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:currentUrl,quality:selectedQuality,format:selectedFormat})});if(!r.ok){const e=await r.json();throw new Error(e.error||'下載失敗');}const blob=await r.blob();const a=document.createElement('a');a.href=URL.createObjectURL(blob);let fn=selectedFormat==='mp3'?'audio.mp3':'video.mp4';const cd=r.headers.get('Content-Disposition');if(cd){const m=cd.match(/filename\*=UTF-8''(.+)/);if(m)fn=decodeURIComponent(m[1]);}a.download=fn;a.click();URL.revokeObjectURL(a.href);}catch(e){showError(e.message);}finally{showLoading(false);}}
analyzeBtn.addEventListener('click',analyzeUrl);downloadBtn.addEventListener('click',download);urlInput.addEventListener('keypress',e=>{if(e.key==='Enter')analyzeUrl();});
document.querySelector('.format-card').classList.add('selected');document.querySelector('.quality-card').classList.add('active');qualitySection.style.display='block';
</script>
</body>
</html>
